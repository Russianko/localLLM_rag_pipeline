apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: ai-station
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: local_ai_station-worker:latest
          imagePullPolicy: Never
          command: ["python", "-m", "app.worker"]
          env:
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: LM_STUDIO_BASE_URL
              value: http://host.docker.internal:1234/v1
          volumeMounts:
            - name: storage
              mountPath: /app/local_brain
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: ai-storage
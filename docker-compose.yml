services:
  redis:
    image: redis:7-alpine
    container_name: local-ai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-ai-api
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "8000:8000"
    environment:
      ENV: docker
      ASSISTANT_TYPE: rag

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_QUEUE_PROCESS: jobs:process
      REDIS_JOB_TTL_SECONDS: 86400

      LM_STUDIO_BASE_URL: http://host.docker.internal:1234/v1
      LM_STUDIO_API_KEY: lm-studio

      CHAT_MODEL: qwen2.5-vl-3b-instruct
      EMBEDDING_MODEL: nomic-ai/nomic-embed-text-v1.5
      CHROMA_COLLECTION: documents_nomic_768

      DATA_DIR: /app/local_brain/data
      OBSIDIAN_VAULT_DIR: /app/local_brain/obsidian_vault

      DEV_FAST_MODE: "true"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./local_brain:/app/local_brain
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-ai-worker
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      ENV: docker
      ASSISTANT_TYPE: rag

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_QUEUE_PROCESS: jobs:process
      REDIS_JOB_TTL_SECONDS: 86400

      LM_STUDIO_BASE_URL: http://host.docker.internal:1234/v1
      LM_STUDIO_API_KEY: lm-studio

      CHAT_MODEL: qwen2.5-vl-3b-instruct
      EMBEDDING_MODEL: nomic-ai/nomic-embed-text-v1.5
      CHROMA_COLLECTION: documents_nomic_768

      DATA_DIR: /app/local_brain/data
      OBSIDIAN_VAULT_DIR: /app/local_brain/obsidian_vault

      DEV_FAST_MODE: "true"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./local_brain:/app/local_brain
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python -m app.worker

volumes:
  redis_data: